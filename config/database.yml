default: &default
  adapter: postgresql
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: ourbandiscalled_development

test:
  <<: *default
  database: ourbandiscalled_test
  variables:
    lock_timeout: 5000
    statement_timeout: 5000

production:
  <<: *default
